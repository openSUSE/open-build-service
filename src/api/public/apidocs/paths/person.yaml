get:
  summary: List all people.
  description: List all people.
  security:
    - basic_authentication: []
  parameters:
    - in: query
      name: prefix
      schema:
        type: string
      required: false
      description: A prefix to filter the people to look for
      example: 'Adm'
    - in: query
      name: confirmed
      schema:
        type: string
        enum:
          - '0'
          - '1'
          - 'true'
          - 'false'
      required: false
      description: |
        Set to `1`/`true` to list only active users. Set to `0`/`false` to list
        all users that are not deleted. Any other value returns a `400`
        Bad Request response.

        Passing the parameter without a value is **deprecated** and will be
        removed in a future release. For backwards compatibility it is currently
        still accepted and treated like `1`. When used without a value the
        response will include a `Deprecation: true` header.
      example: 1

  responses:
    '200':
      description: |
        OK. The request has succeeded.

        XML Schema used for body validation: [directory.xsd](../schema/directory.xsd)
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/directory.yaml'
          example:
            count: '9'
            entry:
              - name: 'Admin'
              - name: '_nobody_'
              - name: 'Iggy'
              - name: 'user_1'
              - name: 'repo-checker'
              - name: 'reviewhero'
              - name: 'user_2'
              - name: 'user_3'
              - name: 'Requestor'
    '400':
      description: Bad Request.
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/api_response.yaml'
          examples:
            Invalid confirmed:
              description: Passing a value different than `0`, `1`, `true` or `false` to `confirmed`.
              value:
                code: invalid_parameter
                summary: "The 'confirmed' parameter only accepts '1', '0', 'true' or 'false', got 'yes'."
  tags:
    - Person

post:
  summary: Executes a command on the person endpoint.
  description: |
    Allows executing command on the person endpoint.

    As of now, the only command allowed is 'register'.
  parameters:
    - in: query
      name: cmd
      schema:
        type: string
        enum: [register]
      required: true
      description: The command to execute
      example: register
  requestBody:
    description: The data for the person to register.
    required: true
    content:
      application/xml:
        schema:
          $ref: '../components/schemas/unregistered_person.yaml'
  responses:
    '200':
      $ref: '../components/responses/succeeded.yaml'
    '400':
      $ref: '../components/responses/unknown_command_error.yaml'
  tags:
    - Person
