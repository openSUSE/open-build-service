get:
  summary: List canned responses
  description: Get a list of all canned responses for the authenticated user.
  security:
    - basic_authentication: []
  responses:
    '200':
      description: OK. The request has succeeded.
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/canned_responses.yaml'
          example:
            count: 2
            canned_response:
              - id: 1
                title: Thank you
                content: Thank you for your contribution!
                user: Iggy
                created_at: 2024-01-15 10:30:00 UTC
                updated_at: 2024-01-15 10:30:00 UTC
              - id: 2
                title: Cleared
                content: This report has been cleared.
                user: Iggy
                decision_type: cleared
                created_at: 2024-01-16 14:00:00 UTC
                updated_at: 2024-01-16 14:00:00 UTC
    '401':
      $ref: '../components/responses/unauthorized.yaml'
  tags:
    - Canned Responses

post:
  summary: Create a canned response
  description: |
    Create a new canned response for the authenticated user.

    Possible values for decision_type: (cleared, favored, favored_with_comment_moderation, favored_with_delete_request, favored_with_user_deletion, favored_with_user_commenting_restriction).

    The decision_type attribute is optional. If not provided, the canned response is for normal comments.
  security:
    - basic_authentication: []
  requestBody:
    description: Attributes for the canned response.
    required: true
    content:
      application/xml; charset=utf-8:
        schema:
          $ref: '../components/schemas/canned_response.yaml'
        example:
          title: Thank you
          content: Thank you for your contribution!
          decision_type: cleared
  responses:
    '200':
      description: OK. The request has succeeded.
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/canned_response.yaml'
          example:
            id: 1
            title: Thank you
            content: Thank you for your contribution!
            user: Iggy
            decision_type: cleared
            created_at: 2024-01-15 10:30:00 UTC
            updated_at: 2024-01-15 10:30:00 UTC
    '400':
      $ref: '../components/responses/validation_error.yaml'
    '401':
      $ref: '../components/responses/unauthorized.yaml'
  tags:
    - Canned Responses
