put:
  summary: Update a token of a person.
  description: Update a specified token of a person.
  security:
    - basic_authentication: []
  parameters:
    - $ref: '../components/parameters/login.yaml'
    - in: path
      name: id
      schema:
        type: string
      required: true
      description: Id of the token to be removed.
      example: 3
    - in: query
      name: enabled
      schema:
        type: string
        enum: [true, false]
      description: |
        Indicates whether a token can accept trigger requests or not.

        A token is created with this attribute set to `true`. However, this
        attribute may be automatically set to `false` depending on the number
        of failed trigger requests associated with the token.
      example: false
  responses:
    '200':
      description: |
        OK. The request has succeeded.

        XML Schema used for body validation: [status.rng](../schema/status.rng)
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/api_response.yaml'
          example:
            code: ok
            summary: Ok
    '400':
      description: |
        Bad Request.

        XML Schema used for body validation: [status.rng](../schema/status.rng)
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/api_response.yaml'
          examples:
            Invalid token attributes:
              value:
                code: invalid_token_attributes
                summary: 'Parameters to modify token attributes are missing.'
            Invalid token attribute value:
              value:
                code: invalid_token_attribute_value
                summary: "'1' is not a valid 'enabled' attribute value. Use 'true' or 'false'."
    '401':
      $ref: '../components/responses/unauthorized.yaml'
    '403':
      description: |
        Forbidden.

        XML Schema used for body validation: [status.rng](../schema/status.rng)
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/api_response.yaml'
          example:
            code: update_user_not_authorized
            summary: 'You are not authorized to update this User.'
    '404':
      description: |
        Not Found.

        XML Schema used for body validation: [status.rng](../schema/status.rng)
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/api_response.yaml'
          example:
            code: not_found
            summary: Couldn't find Token with 'id'=33
  tags:
    - Person

