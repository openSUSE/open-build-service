get:
  summary: Get a canned response
  description: Get a canned response by id. Only the owner of the canned response can access it.
  security:
    - basic_authentication: []
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: Id of the canned response.
  responses:
    '200':
      description: OK. The request has succeeded.
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/canned_response.yaml'
          example:
            id: 1
            title: Thank you
            content: Thank you for your contribution!
            user: Iggy
            decision_type: cleared
            created_at: 2024-01-15 10:30:00 UTC
            updated_at: 2024-01-15 10:30:00 UTC
    '401':
      $ref: '../components/responses/unauthorized.yaml'
    '404':
      $ref: '../components/responses/not_found.yaml'
  tags:
    - Canned Responses

put:
  summary: Update a canned response
  description: Update a canned response by id. Only the owner of the canned response can update it.
  security:
    - basic_authentication: []
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: Id of the canned response.
  requestBody:
    description: Attributes for the canned response to update.
    required: true
    content:
      application/xml; charset=utf-8:
        schema:
          $ref: '../components/schemas/canned_response.yaml'
        example:
          title: Updated title
          content: Updated content for the canned response.
  responses:
    '200':
      description: OK. The request has succeeded.
      content:
        application/xml; charset=utf-8:
          schema:
            $ref: '../components/schemas/canned_response.yaml'
          example:
            id: 1
            title: Updated title
            content: Updated content for the canned response.
            user: Iggy
            created_at: 2024-01-15 10:30:00 UTC
            updated_at: 2024-01-17 09:15:00 UTC
    '400':
      $ref: '../components/responses/validation_error.yaml'
    '401':
      $ref: '../components/responses/unauthorized.yaml'
    '404':
      $ref: '../components/responses/not_found.yaml'
  tags:
    - Canned Responses

delete:
  summary: Delete a canned response
  description: Delete a canned response by id. Only the owner of the canned response can delete it.
  security:
    - basic_authentication: []
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: Id of the canned response.
  responses:
    '200':
      $ref: '../components/responses/succeeded.yaml'
    '401':
      $ref: '../components/responses/unauthorized.yaml'
    '404':
      $ref: '../components/responses/not_found.yaml'
  tags:
    - Canned Responses
